<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        body{max-width:600px;margin:50px auto;font-family: Arial}
        input,textarea{width:100%;margin:10px 0;padding:12px;box-sizing:border-box}
        button{padding:12px 20px;background:#007bff;color:white;border:none;font-size:16px}
    </style>
    <script>
        window.onload = function (){
            if(!localStorage.token){
                alert("请先登录！");
                location.href="login.html";
            }

            const str = localStorage.getItem("currArt");
            if(!str)
            {
                return;
            }
            const title = document.getElementById('title');
            const content = document.getElementById('content');
            const data = JSON.parse(str);
            title.value = data.title;
            content.value = data.content;
        }
    </script>
    <script src="/js/utils.js"></script>
</head>
<body>
<input id="title" placeholder="标题" value="">
<textarea id="content" rows="10" placeholder="内容"></textarea>
<button onclick="edit()">修改</button>
</body>
<script>

    async function edit(){
        let title = document.getElementById('title').value.trim();
        let content = document.getElementById('content').value.trim();
        const token = localStorage.token;
        const  btn = document.querySelector('button[onclick="edit()"]');
        btn.disabled = true;
        btn.textContent = "发布中";
        const str = localStorage.getItem("currArt");
        const data = JSON.parse(str);
        const artId = data.artId;

        if(token == null)
        {
            alert("无token");
        }

        try{
            if(!title || !content){
                alert("标题和内容不能为空！");
                return;
            }

            let res = await fetch(`${BASE_URL}/article/edit/${artId}`,{
                method: "PUT",
                headers:{
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({title, content})
            });
            if(!res.ok) throw new Error("网络请求错误");

            res = await res.json();
            if(res.success){
                alert("修改成功");
                location.href = "index.html";
            }else{
                alert(res.msg);
            }

    }catch (err)
        {
            alert("修改失败，服务器连接异常");
        }

        btn.disabled = false;
        btn.textContent = "发布";
    }
</script>
</html>
