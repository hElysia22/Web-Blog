<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <style>
        body{max-width:400px;margin:50px auto;font-family: Arial}
        input{width:100%;margin:10px 0;padding:12px;box-sizing:border-box}
        button{width:100%;padding:12px;background:#007bff;color:white;border:none;font-size:16px;margin-top:5px}
        .btn-gray{background:gray}
        .btn-green{background:green}
    </style>
    <script src="/js/utils.js"></script>
</head>
<body>
<h2>登录</h2>
<input id="username" placeholder="用户名" required>
<input id="password" type="password" placeholder="密码" required>
<button onclick="login()">登录</button>
<button class="btn-gray" onclick="window.location='register.html'">去注册</button>
<button class="btn-green" onclick="window.location='index.html'">博客首页</button>

<script>
    async function login() {
        let username = document.getElementById('username').value.trim()
        let password = document.getElementById('password').value.trim()

        if(!username || !password){
            alert("请输入账号密码！");
            return;
        }

        try {
            let res = await fetch(`${BASE_URL}/login`,{
                method: 'POST',
                headers: {'Content-Type' : 'application/json'},
                body: JSON.stringify({username, password})
            });
            if(!res.ok) throw new Error("网络请求错误");
            res = await res.json();
            if(res.success){
                localStorage.token = res.token;
                alert("登录成功");
                location.href = "index.html";
            }else{
                alert("账号不存在");
            }
        } catch (err) {
            alert('登录失败：' + err.message);
        }
    }
</script>
</body>
</html>
