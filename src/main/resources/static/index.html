<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>博客首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }
        body {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
        }
        /* 用户名+退出按钮同行布局 */
        .user-info {
            position: fixed;
            top: 10px;
            left: 20px;
            font-size: 16px;
            color: #333;
            background: #f5f5f5;
            padding: 6px 12px;
            border-radius: 4px;
            z-index: 999;
            /* 横向排列 */
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logout-btn{
            border: none;
            background: #6c757d;
            color: #fff;
            padding: 3px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
        }
        .page-title {
            text-align: center;
            margin: 60px 0 30px;
            color: #222;
        }
        .btn-group {
            text-align: center;
            margin-bottom: 30px;
        }
        .btn {
            padding: 10px 20px;
            margin: 0 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
        }
        .btn-primary {
            background: #007bff;
            color: white;
        }
        .article-wrap {
            position: relative;
            margin: 15px 0;
        }
        .del-btn {
            background: #dc3545;
            color: white;
            float: right;
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10; /* 层级拉高，浮在卡片上方 */
            padding: 4px 10px;
            border: none;
            border-radius: 4px;
            background: #dc3545;
            color: #fff;
            cursor: pointer;
        }
        .del-btn:hover {
            background: #bb2d3b;
        }
        .article {
            border: 1px solid #eee;
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #222;
        }
        .time {
            color: #999;
            font-size: 13px;
            margin-bottom: 15px;
        }
        .content {
            line-height: 1.6;
            color: #555;
            word-break: break-all;
        }
        /* 分页样式 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 30px;
            gap: 8px;
        }
        .pagination-btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        .pagination-btn:hover {
            background: #f5f5f5;
        }
        .pagination-btn.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        .pagination-btn:disabled {
            cursor: not-allowed;
            color: #999;
            background: #f9f9f9;
            border-color: #eee;
        }
    </style>
    <script src="/js/utils.js"></script>
</head>
<body>
<!-- 用户名 + 退出按钮同行 -->
<div class="user-info" id="userInfoBox">
    <span id="userName"></span>
    <button class="logout-btn" id="exitBtn" style="display:none;" onclick="logout()">退出登录</button>
</div>

<h1 class="page-title">个人博客</h1>

<div class="btn-group">
    <button id="loginBtn" class="btn btn-primary" onclick="location.href='login.html'">登录发布文章</button>
    <button id="publishBtn" class="btn btn-primary" style="display:none;" onclick="location.href='publish.html'">发布文章</button>
</div>

<div id="list"></div>

<div class="pagination" id="pagination"></div>

<script>
    window.onload = function () {
        const token = localStorage.token;
        let username = '';
        let userId = '';

        if(token)
        {
            const payLoad = parseJwt(token);
            if(payLoad)
            {
                username = payLoad.username;
                userId = payLoad.id;
            }
        }

        document.getElementById("userName").innerText = username ? "当前用户：" + username : "";

        if (!userId) {
            // 未登录
            document.getElementById("publishBtn").style.display = "none";
            document.getElementById("exitBtn").style.display = "none";
            document.getElementById("loginBtn").style.display = "inline-block";
        } else {
            // 已登录：显示发布、显示用户名旁的退出
            document.getElementById("loginBtn").style.display = "none";
            document.getElementById("publishBtn").style.display = "inline-block";
            document.getElementById("exitBtn").style.display = "inline-block";
        }
    }

    // 分页相关参数
    let currentPage = 1; // 当前页码
    const pageSize = 5;  // 每页显示数量
    let totalPages = 1;  // 总页数

    async function loadArticles(page = 1) {
        // 拼接分页参数请求接口
        const res = await fetch(`${BASE_URL}/article/list?page=${page}&pageSize=${pageSize}`).then(res => res.json());
        const list = document.getElementById('list');
        let currentUserId = '';
        let isAdmin = false;
        const token = localStorage.token;

        if(token){
            const payload = parseJwt(token);
            console.log("payload.isAdmin：", payload.isAdmin);
            currentUserId = payload?.id || '';
            isAdmin = payload?.isAdmin || false;
        }

        list.innerHTML = "";
        // 渲染当前页文章列表
        res.data.records.forEach(art => {
            list.innerHTML += `
                <div class="article-wrap">
            <div class="article">
                <div class="title">${art.title}</div>
                <div class="time">${art.createTime}</div>
                <div class="content">${art.content}</div>
            </div>
            ${(currentUserId && art.userId == currentUserId) || isAdmin ? `<button class="btn del-btn" onclick="deleteArticle(${art.id})">删除</button>` : ''}
            ${currentUserId && art.userId == currentUserId ? `<button class="btn edit-btn"  onclick='EditData(${JSON.stringify(art)})'>编辑</button>` : ''}
        </div>`
        });

        // 更新分页参数
        currentPage = page;
        totalPages = res.data.pages || 1;

        // 渲染分页控件
        renderPagination();
    }

    // 渲染分页控件
    function renderPagination() {
        const paginationEl = document.getElementById('pagination');
        paginationEl.innerHTML = '';

        // 上一页按钮
        const prevBtn = document.createElement('button');
        prevBtn.className = 'pagination-btn';
        prevBtn.innerText = '上一页';
        prevBtn.disabled = currentPage === 1;
        prevBtn.onclick = () => {
            if (currentPage > 1) {
                loadArticles(currentPage - 1);
            }
        };
        paginationEl.appendChild(prevBtn);

        // 页码按钮
        for (let i = 1; i <= totalPages; i++) {
            const pageBtn = document.createElement('button');
            pageBtn.className = `pagination-btn ${i === currentPage ? 'active' : ''}`;
            pageBtn.innerText = i;
            pageBtn.onclick = () => {
                loadArticles(i);
            };
            paginationEl.appendChild(pageBtn);
        }

        // 下一页按钮
        const nextBtn = document.createElement('button');
        nextBtn.className = 'pagination-btn';
        nextBtn.innerText = '下一页';
        nextBtn.disabled = currentPage === totalPages;
        nextBtn.onclick = () => {
            if (currentPage < totalPages) {
                loadArticles(currentPage + 1);
            }
        };
        paginationEl.appendChild(nextBtn);
    }

    function EditData(art){
        const artData = {
            "artId" : art.id,
            "title" : art.title,
            "content" : art.content
        }
        localStorage.setItem("currArt", JSON.stringify(artData));
        location.href = "edit.html";
    }

    async function deleteArticle(id) {
        if (!confirm("确定删除这篇文章吗？删除后无法恢复！")) return;
        const token = localStorage.token;
        if(!token){
            alert("请先登录");
            return;
        }

        try {
            const res = await fetch(`${BASE_URL}/article/delete/${id}`, {
                method: "DELETE",
                headers:{
                    "Authorization": 'Bearer ' + token
                }
            }).then(res => res.json());

            if (res.success) {
                alert(res.msg);
                // 删除后重新加载当前页
                loadArticles(currentPage);
            } else {
                alert(res.msg);
            }
        } catch (error) {
            alert("删除失败，服务器连接异常");
        }
    }

    /**
     * 退出登录
     */
    function logout() {
        if (confirm("确定退出登录？")) {
                localStorage.removeItem("token");
                alert("退出成功！");
                location.reload();
        }
    }

    // 初始化加载第一页
    loadArticles();
</script>
</body>
</html>
