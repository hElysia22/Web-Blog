<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>注册</title>
    <style>
        body{max-width:400px;margin:50px auto;font-family: Arial}
        input{width:100%;margin:10px 0;padding:12px;box-sizing:border-box}
        button{width:100%;padding:12px;background:#28a745;color:white;border:none;font-size:16px}
    </style>
    <script src="/js/utils.js"></script>
</head>
<body>
<h2>注册</h2>
<input id="username" placeholder="用户名">
<input id="password" type="password" placeholder="密码">
<button onclick="register()">注册（密码自动加密）</button>

<script>
    async function register() {
        let username = document.getElementById('username').value.trim()
        let password = document.getElementById('password').value.trim()

        if(!username || !password){
            alert("请输入账号密码！")
            return
        }

        try {
            let respone = await fetch(`${BASE_URL}/register`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            })
            if(!respone.ok)
            {
                throw new Error('网络请求失败');
            }
            let res = await respone.json()
            alert(res.msg)
            if (res.success)
                location.href='login.html'
        }catch (err){
            alert('注册失败'+err.message);
        }

    }
</script>
</body>
</html>
